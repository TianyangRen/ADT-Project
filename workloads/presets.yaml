# Workload presets reflect heterogeneous query regimes:
# - top_k, latency_budget_ms, min_recall, concurrency
# Used by UI + scripts for batch evaluation.

presets:
  low_latency:
    description: "Very tight latency budget, moderate recall, low concurrency"
    top_k_choices: [5, 10, 20]
    latency_budget_ms_range: [1.0, 3.0]
    min_recall_range: [0.70, 0.90]
    concurrency_choices: [1, 2, 4]

  high_recall:
    description: "High recall requirement, relaxed latency, low concurrency"
    top_k_choices: [10, 20, 50]
    latency_budget_ms_range: [10.0, 30.0]
    min_recall_range: [0.90, 0.99]
    concurrency_choices: [1, 2]

  high_throughput:
    description: "High concurrency (system load), moderate recall, moderate latency"
    top_k_choices: [5, 10, 20]
    latency_budget_ms_range: [5.0, 20.0]
    min_recall_range: [0.75, 0.90]
    concurrency_choices: [8, 16, 32, 64]

  mixed:
    description: "Mixed regime (like real-world shifting workload)"
    top_k_choices: [5, 10, 20, 50, 100]
    latency_budget_ms_range: [2.0, 30.0]
    min_recall_range: [0.60, 0.99]
    concurrency_choices: [1, 2, 4, 8, 16, 32]
